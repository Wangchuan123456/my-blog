<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- 块级元素 -->
  <h1>
    我是块级元素
  </h1>
  <p>
    我也是块级元素
  </p>
  <!-- 行内元素 -->
  <span>
    我是行内元素
  </span>
  <!-- 块级元素能够包含行内元素 -->
  <p>
    <strong>
      我是加粗的
    </strong>
  </p>
  <!-- 行内元素可以嵌套其他行内元素 -->
  <del>
    <em>
      我是斜体的
    </em>
    <strong>
      <mark>
        我是高亮的
      </mark>
    </strong>
  </del>
  <!-- 特殊情况，p标签不能包含其他块级元素 -->

</body>

</html>

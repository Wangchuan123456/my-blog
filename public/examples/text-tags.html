<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>文本标签 · 演示</title>
</head>
<body>
  <h1>文本格式化标签演示</h1>
  <p><strong>加粗强调</strong> 和 <em>斜体强调</em></p>
  <p><del>已删除的内容</del> <ins>新增的内容</ins></p>
  <p>水的化学式 H<sub>2</sub>O，2<sup>3</sup> = 8</p>
  <p>特殊符号：&lt;div&gt; &amp; &copy;</p>
  <hr />
  <p>&copy; 2026 前端学习笔记</p>
</body>
</html>
